<html>
    <head>
        <lablel>ASSIGNMENT 2 TABLE</lable>
<STYLE>
   
tABLE,tr,th,td
{
border:2px solid black;
border-collapse: collapse;
padding: 10px;

}
</style>

    </head>
    <body>
     <table>
        <thead> 
            <tr>
                <th>item</th>
                 <th>quantity</th>
                  <th>Unit price</th>
                   <th>price</th>
                 </tr>
                 </thead> 
                 <tbody>
                    <tr>
                        <td>Pencil</td>
                          <td>2</td>
                            <td>$1</td>
                              <td>$2 </td>
                    </tr>
                    <tr>
                        <td>Eraser</td>
                         <td>4</td>
                          <td rowspan="2">$0.50</td>
                           <td>$2</td>
                    </tr>
                    <tr>
                        <td colspan="3">Subtotal</td>
                        <td>$4</td>
                    </tr>
                    <tr>
                        <td>Tax</td>
                        <td>10%</td>
                        <td colspan="2">$0.4</td>
                    </tr>
                 </tbody>
                 <tfoot>
                    <td colspan="4">Footer of the table</td>
                 </tfoot>
        </table>
    </body>
</html>
